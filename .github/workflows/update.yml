name: Update vendored VMAware header and create a new tag if applicable

on:
  schedule:
    - cron: "0 9,21 * * *"
  workflow_dispatch:
  push:
    branches: [ci-test]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Get latest VMAware release tag
        id: vmaware
        run: |
          set -e
          tag=$(curl -s https://api.github.com/repos/kernelwernel/VMAware/releases/latest \
            | jq -r .tag_name)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check if release tag is new
        id: check_tag
        run: |
          tag="${{ steps.vmaware.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$tag$"; then
            echo "is_new_tag=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_new_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get latest VMAware main SHA
        id: sha
        run: |
          sha=$(curl -s https://api.github.com/repos/kernelwernel/VMAware/commits/main \
            | jq -r .sha)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Update vendored header
        run: |
          curl -fsSL -o deps/vmaware.hpp \
            https://raw.githubusercontent.com/kernelwernel/VMAware/main/src/vmaware.hpp

      - name: Check if header changed
        id: changed
        run: |
          git diff --quiet deps/vmaware.hpp \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Test
        id: test
        if: steps.changed.outputs.changed == 'true'
        run: |
            cargo run --example basic 2>&1 && echo "success=true" >> "$GITHUB_OUTPUT" || echo "success=false" >> "$GITHUB_OUTPUT"
            

      - name: Configure git
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Cargo.toml version
        if: steps.check_tag.outputs.is_new_tag == 'true' && steps.changed.outputs.changed == 'true'
        run: |
          version="${{ steps.vmaware.outputs.tag }}"
          version="${version#v}"
          sed -i "s/^version = .*/version = \"$version\"/" Cargo.toml

      # Example ran fine, push to master and a tag
      - name: Push to master and tag
        if: steps.changed.outputs.changed == 'true' && steps.test.outputs.success == 'true'
        run: |
          git add deps/vmaware.hpp Cargo.toml
          if [ "${{ steps.check_tag.outputs.is_new_tag }}" == "true" ]; then
            git commit -m "chore: update VMAware to ${{ steps.vmaware.outputs.tag }}"
            git push
            git tag ${{ steps.vmaware.outputs.tag }}
            git push --tags
          else
            git commit -m "chore: sync VMAware main (${{ steps.sha.outputs.sha }})"
            git push
          fi

      # Running the example failed, open a PR instead
      - name: Open PR on build failure
        if: steps.changed.outputs.changed == 'true' && steps.test.outputs.success == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update VMAware to ${{ steps.vmaware.outputs.tag }}"
          title: "⚠️ VMAware update failed to build"
          branch: update-vmaware-${{ steps.vmaware.outputs.tag }}
          assignees: MarcelDev
          draft: true
          body: |
            VMAware updated, but running the example failed (runtime panic, or compile error).
            Review the changes, and fix it before merging.
            
            VMAware ref: ${{ steps.vmaware.outputs.tag }}
            Main SHA: ${{ steps.sha.outputs.sha }}